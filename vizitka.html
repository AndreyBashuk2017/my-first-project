<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Андрей — Загородные дома</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: rgba(255,255,255,0.07);
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background particles */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent1); top: -100px; left: -100px; animation-duration: 14s; }
    .orb-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-duration: 10s; animation-delay: -4s; }
    .orb-3 { width: 250px; height: 250px; background: var(--accent3); top: 50%; right: 20%; animation-duration: 16s; animation-delay: -8s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 420px;
      width: calc(100% - 32px);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Avatar */
    .avatar-wrap {
      margin: 0 auto 28px;
      width: 90px; height: 90px;
      position: relative;
    }
    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: 2px;
      background: var(--card);
      border-radius: 50%;
    }
    .avatar {
      position: relative;
      z-index: 1;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e1e2e, #2d2d44);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .avatar svg { width: 48px; height: 48px; }

    /* Name */
    .name {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent1) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      display: inline-block;
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(124,58,237,.5)) drop-shadow(0 0 20px rgba(6,182,212,.3)); }
      50%       { filter: drop-shadow(0 0 16px rgba(124,58,237,.8)) drop-shadow(0 0 40px rgba(6,182,212,.5)); }
    }

    /* Divider */
    .divider {
      margin: 18px auto 0;
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
    }

    /* Specialization badge */
    .spec-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 8px 18px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 40px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #a78bfa;
      letter-spacing: 0.3px;
    }
    .spec-badge svg { flex-shrink: 0; }

    /* Tagline */
    .tagline {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 1px;
      margin: 28px 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .stat {
      flex: 1;
      padding: 14px 8px;
      background: rgba(255,255,255,0.02);
      transition: background .2s;
    }
    .stat:hover { background: rgba(255,255,255,0.05); }
    .stat + .stat { border-left: 1px solid var(--border); }
    .stat-num {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      color: var(--muted);
      transition: all .25s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity .25s;
    }
    .social-btn:hover {
      transform: translateY(-4px) scale(1.08);
      border-color: transparent;
      box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    }
    .social-btn:hover::before { opacity: 1; }
    .social-btn:hover svg { position: relative; z-index: 1; color: #fff; }

    .social-btn.telegram::before  { background: linear-gradient(135deg, #2aabee, #229ed9); }
    .social-btn.whatsapp::before  { background: linear-gradient(135deg, #25d366, #128c7e); }
    .social-btn.instagram::before { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .social-btn.vk::before        { background: linear-gradient(135deg, #4680c2, #2787f5); }

    .social-btn.telegram:hover  { color: #2aabee; }
    .social-btn.whatsapp:hover  { color: #25d366; }
    .social-btn.instagram:hover { color: #f09433; }
    .social-btn.vk:hover        { color: #2787f5; }

    /* CTA button */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent1) 0%, #5b21b6 50%, var(--accent2) 100%);
      background-size: 200% 200%;
      background-position: 0% 50%;
      text-decoration: none;
      transition: all .3s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
      animation: bgShift 4s ease infinite;
    }
    @keyframes bgShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,.12), transparent);
      border-radius: 16px;
    }
    .cta:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(124,58,237,0.55);
    }
    .cta:active { transform: translateY(0) scale(.99); }
    .cta svg { position: relative; z-index: 1; }
    .cta span { position: relative; z-index: 1; }

    /* Ripple */
    .cta .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      font-size: 0.72rem;
      color: #2d2d3a;
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .card { padding: 40px 24px 36px; }
      .stats { gap: 0; }
    }
  </style>
</head>

  <script>
    // Ripple effect on CTA button
    document.getElementById('ctaBtn').addEventListener('click', function(e) {
      const btn = this;
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      ripple.className = 'ripple';
      ripple.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${e.clientX - rect.left - size / 2}px;
        top: ${e.clientY - rect.top - size / 2}px;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    // Tilt effect on card (desktop only)
    const card = document.querySelector('.card');
    if (window.matchMedia('(hover: hover)').matches) {
      document.addEventListener('mousemove', (e) => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx;
        const dy = (e.clientY - cy) / cy;
        card.style.transform = `perspective(800px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg)`;
      });
      document.addEventListener('mouseleave', () => {
        card.style.transform = '';
        card.style.transition = 'transform .5s ease';
        setTimeout(() => card.style.transition = '', 500);
      });
    }
  </script>
